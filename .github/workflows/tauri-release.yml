name: "Release"

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "ubuntu-22.04"
            args: ""
          - platform: "windows-latest"
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        name: Install pnpm
        with:
          cache: true

      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Habilitar caminhos longos no Git do Windows
        if: matrix.platform == 'windows-latest'
        run: git config --system core.longpaths true

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install tauri-typegen
        run: cargo install tauri-typegen

      - name: Generate TypeScript bindings
        run: cargo tauri-typegen generate

      - uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          appName: "QSARModeling"
          tagName: v__VERSION__ # the action automatically replaces \_\_VERSION\_\_ with the app version.
          releaseName: v__VERSION__
          releaseBody: |
            Early-stage release of QSARModeling. This is still very experimental and therefore many bugs are known and expected.

            You can use the [example datasets](https://github.com/hellmrf/qsarmodeling/tree/refs/tags/v__VERSION__/src-tauri/examples/data) to test the application.

            See the assets below to download this version and install.
            Currently available for:

            - **Windows** (`.exe`)
            - **Ubuntu/Debian** (`.deb`)
            - **Linux** (`.AppImage`) - [run directly](https://discourse.appimage.org/t/how-to-run-an-appimage/80)
            or install with something like [AppImageLauncher](https://appimagelauncher.com/).
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
